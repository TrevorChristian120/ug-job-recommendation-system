<!DOCTYPE html>
<html>

<head>

    <title>Uganda Job Recommendation System</title>

    ://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-body">

            <h1 class="text-center mb-4">
                Uganda Job Recommendation System
            </h1>

            <form method="POST">

                <label class="form-label">
                    Full Name
                </label>

                <input
                    type="text"
                    class="form-control"
                    name="name"
                    required>

                <br>

                <label class="form-label">
                    Degree
                </label>

                <input
                    type="text"
                    class="form-control"
                    name="degree"
                    required>

                <br>

                <label class="form-label">
                    Skills
                </label>

                <textarea
                    name="skills"
                    class="form-control"
                    rows="6"
                    required>
                </textarea>

                <br>

                <label class="form-label">
                    Experience
                </label>

                <textarea
                    name="experience"
                    class="form-control"
                    rows="4"
                    required>
                </textarea>

                <br>

                <button
                    class="btn btn-primary">
                    Get Recommendations
                </button>

            </form>

        </div>

    </div>

</div>

</body>

</html>
