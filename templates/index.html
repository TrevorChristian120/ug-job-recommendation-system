<!DOCTYPE html>
<html>

<head>
    <title>Uganda Job Recommendation System</title>
</head>

<body>

    <h1>Uganda Job Recommendation System</h1>

    <h3>Enter Your Skills</h3>

    <form method="POST">

        <textarea
            name="skills"
            rows="8"
            cols="60"
            placeholder="Example: Python Flask SQL Git">
        </textarea>

        <br><br>

        <button type="submit">
            Find Matching Jobs
        </button>

    </form>

</body>

</html>
